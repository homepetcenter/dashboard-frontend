<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-Site Analytics Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { font-family: system-ui, -apple-system, sans-serif; }
  body { background: #f1f5f9; margin: 0; }
  .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 20px; }
  .stat-value { font-size: 2rem; font-weight: 800; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 9999px; background: #dbeafe; color: #1e40af; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Table } = Recharts;

const SITES = [
  { id: 'homepetcenter', name: 'homepetcenter.co.il', propertyId: '123456789' },
  { id: 'quickpet', name: 'quickpet.co.il', propertyId: '987654321' },
  { id: 'athlent', name: 'athlent.com', propertyId: '555666777' },
];

function App() {
  const [selectedSite, setSelectedSite] = useState('homepetcenter');
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    loadData();
  }, [selectedSite]);

  const loadData = async () => {
    setLoading(true);
    const site = SITES.find(s => s.id === selectedSite);
    
    try {
      const response = await fetch('https://dashboard-backend-production-e29c.up.railway.app/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ propertyId: site.propertyId, siteUrl: site.name })
      });
      const result = await response.json();
      setData(result);
    } catch (err) {
      console.error('Error:', err);
      // Fallback to mock data
      setData({
        analytics: { sessions: 10081, users: 7546, bounceRate: 42.8, avgDuration: '3:41', pageViews: 30988 },
        searchConsole: { impressions: 92620, clicks: 1418, ctr: 1.53 }
      });
    }
    setLoading(false);
  };

  if (!data) return <div style={{ padding: '20px', textAlign: 'center' }}>Loading...</div>;

  return (
    <div style={{ minHeight: '100vh', background: '#f1f5f9', padding: '20px' }}>
      <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
        
        {/* Header */}
        <div className="card" style={{ marginBottom: '20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' }}>
            <h1 style={{ margin: 0, fontSize: '1.5rem', fontWeight: 800 }}>📊 Analytics Dashboard</h1>
            <select value={selectedSite} onChange={(e) => setSelectedSite(e.target.value)} 
              style={{ padding: '10px 15px', borderRadius: '8px', border: '1px solid #e2e8f0', fontSize: '1rem', cursor: 'pointer' }}>
              {SITES.map(site => (
                <option key={site.id} value={site.id}>{site.name}</option>
              ))}
            </select>
          </div>
        </div>

        {/* KPIs */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '15px', marginBottom: '20px' }}>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>Sessions</div>
            <div className="stat-value">{data.analytics.sessions.toLocaleString()}</div>
          </div>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>Users</div>
            <div className="stat-value">{data.analytics.users.toLocaleString()}</div>
          </div>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>Bounce Rate</div>
            <div className="stat-value">{data.analytics.bounceRate.toFixed(1)}%</div>
          </div>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>Impressions</div>
            <div className="stat-value">{data.searchConsole.impressions.toLocaleString()}</div>
          </div>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>Clicks</div>
            <div className="stat-value">{data.searchConsole.clicks.toLocaleString()}</div>
          </div>
          <div className="card">
            <div style={{ color: '#64748b', fontSize: '0.9rem', marginBottom: '8px' }}>CTR</div>
            <div className="stat-value">{data.searchConsole.ctr.toFixed(2)}%</div>
          </div>
        </div>

        {/* Footer */}
        <div style={{ textAlign: 'center', color: '#94a3b8', fontSize: '0.85rem' }}>
          Powered by Railway Backend | {new Date().toLocaleDateString()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
