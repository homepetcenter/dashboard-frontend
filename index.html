<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, "Segoe UI", Arial, sans-serif; }
    .range-btn { background:#fff; color:#475569; }
    .range-btn:hover { background:#f1f5f9; }
    .range-btn.active { background:#1d4ed8; color:#fff; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">

  <!-- Header -->
  <div class="bg-white rounded-2xl shadow-sm p-5 flex flex-wrap items-center justify-between gap-3 mb-6">
    <h1 class="text-2xl font-bold text-slate-800">ðŸ“Š Analytics Dashboard</h1>
    <div class="flex flex-wrap items-center gap-3">
      <!-- Date range -->
      <div id="rangeButtons" class="flex rounded-lg overflow-hidden border border-slate-300">
        <button data-range="7d"  class="range-btn px-3 py-2 text-sm">7 ×™×ž×™×</button>
        <button data-range="30d" class="range-btn px-3 py-2 text-sm">30 ×™×•×</button>
        <button data-range="90d" class="range-btn px-3 py-2 text-sm">90 ×™×•×</button>
        <button data-range="12m" class="range-btn px-3 py-2 text-sm">×©× ×”</button>
      </div>
      <!-- Site -->
      <select id="siteSelect"
        class="border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="homepetcenter">homepetcenter.co.il</option>
        <option value="quickpet">quickpet.co.il</option>
        <option value="tiktakpet">tiktakpet.co.il</option>
      </select>
    </div>
  </div>

  <!-- Status -->
  <div id="status" class="hidden mb-4 text-center text-sm rounded-lg py-2"></div>

  <!-- KPI cards -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">Sessions</div>
      <div id="kpiSessions" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">Users</div>
      <div id="kpiUsers" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">Bounce Rate</div>
      <div id="kpiBounce" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">Impressions</div>
      <div id="kpiImpr" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">Clicks</div>
      <div id="kpiClicks" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="text-slate-500 text-sm mb-1">CTR</div>
      <div id="kpiCtr" class="text-3xl font-bold text-blue-700">â€”</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
    <div id="chartTitle" class="text-slate-600 font-medium mb-3">Sessions</div>
    <canvas id="sessionsChart" height="90"></canvas>
  </div>

  <div class="text-center text-slate-400 text-xs">Powered by Railway Backend | Dashboard v2.0 (live data)</div>

  <script>
    const API = "https://dashboard-backend-production-e29c.up.railway.app/api/data";
    const fmt = (n) => Number(n || 0).toLocaleString("en-US");
    const RANGE_LABEL = { "7d": "7 ×™×ž×™× ××—×¨×•× ×™×", "30d": "30 ×™×•× ××—×¨×•× ×™×", "90d": "90 ×™×•× ××—×¨×•× ×™×", "12m": "×©× ×” ××—×¨×•× ×”" };
    let chart;
    let currentRange = "30d";

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      if (!msg) { el.classList.add("hidden"); return; }
      el.textContent = msg;
      el.className = "mb-4 text-center text-sm rounded-lg py-2 " +
        (type === "error" ? "bg-red-100 text-red-700" : "bg-blue-50 text-blue-600");
    }

    // "20260603" -> "03/06" ; "202606" (yearMonth) -> "06/2026"
    function niceDate(d) {
      if (!d) return d;
      if (d.length === 8) return d.slice(6, 8) + "/" + d.slice(4, 6);
      if (d.length === 6) return d.slice(4, 6) + "/" + d.slice(0, 4);
      return d;
    }

    function renderChart(series) {
      const labels = series.map((p) => niceDate(p.date));
      const data = series.map((p) => p.sessions);
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById("sessionsChart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Sessions",
            data,
            borderColor: "#1d4ed8",
            backgroundColor: "rgba(29,78,216,0.08)",
            fill: true,
            tension: 0.35,
            pointRadius: 2,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: false } },
        },
      });
    }

    async function load() {
      const site = document.getElementById("siteSelect").value;
      document.getElementById("chartTitle").textContent = "Sessions â€” " + (RANGE_LABEL[currentRange] || "");
      setStatus("×˜×•×¢×Ÿ × ×ª×•× ×™×...", "info");
      document.querySelectorAll("[id^=kpi]").forEach((e) => (e.textContent = "â€¦"));
      try {
        const res = await fetch(API + "?site=" + encodeURIComponent(site) + "&range=" + currentRange);
        const d = await res.json();
        if (d.error) throw new Error(d.error);
        const a = d.analytics || {}, s = d.searchConsole || {};
        document.getElementById("kpiSessions").textContent = fmt(a.sessions);
        document.getElementById("kpiUsers").textContent = fmt(a.users);
        document.getElementById("kpiBounce").textContent = (a.bounceRate ?? 0) + "%";
        document.getElementById("kpiImpr").textContent = fmt(s.impressions);
        document.getElementById("kpiClicks").textContent = fmt(s.clicks);
        document.getElementById("kpiCtr").textContent = (s.ctr ?? 0) + "%";
        renderChart(a.series || []);
        setStatus("", null);
      } catch (err) {
        setStatus("×©×’×™××” ×‘×˜×¢×™× ×ª ×”× ×ª×•× ×™×: " + err.message, "error");
        document.querySelectorAll("[id^=kpi]").forEach((e) => (e.textContent = "â€”"));
      }
    }

    // Range buttons
    function setActiveRange(r) {
      currentRange = r;
      document.querySelectorAll(".range-btn").forEach((b) =>
        b.classList.toggle("active", b.dataset.range === r)
      );
    }
    document.querySelectorAll(".range-btn").forEach((b) =>
      b.addEventListener("click", () => { setActiveRange(b.dataset.range); load(); })
    );

    document.getElementById("siteSelect").addEventListener("change", load);

    setActiveRange("30d");
    load();
  </script>
</body>
</html>
